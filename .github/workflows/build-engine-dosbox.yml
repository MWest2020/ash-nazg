name: build-engine-dosbox

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'engines/dosbox-x/**'
      - '.github/workflows/build-engine-dosbox.yml'
  pull_request:
    paths:
      - 'engines/dosbox-x/**'
      - '.github/workflows/build-engine-dosbox.yml'

permissions:
  contents: read
  packages: write

# KasmVNC version pin. Keep in sync with the Dockerfile default; the
# release pipeline reads this when bumping. Verified 2026-05-08.
env:
  KASMVNC_VERSION: "1.4.0"

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ash-nazg-dosbox-x
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: build (and push when not PR)
        uses: docker/build-push-action@v6
        with:
          context: ./engines/dosbox-x
          file: ./engines/dosbox-x/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KASMVNC_VERSION=${{ env.KASMVNC_VERSION }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=engine-dosbox
          cache-to: type=gha,scope=engine-dosbox,mode=max
