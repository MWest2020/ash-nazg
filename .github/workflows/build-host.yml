name: build-host

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'host/**'
      - '.github/workflows/build-host.yml'
  pull_request:
    paths:
      - 'host/**'
      - '.github/workflows/build-host.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ash-nazg-host
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: build (and push when not PR)
        uses: docker/build-push-action@v6
        with:
          # Build context is repo root so the Dockerfile's
          # frontend-build stage can see frontend/ alongside host/.
          context: .
          file: ./host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=host
          cache-to: type=gha,scope=host,mode=max
