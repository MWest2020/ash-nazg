name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  host-pytest:
    name: host — pytest + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./host
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install uv
        run: pip install --no-cache-dir 'uv==0.5.6'

      - name: "install deps (extras: dev)"
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: pytest
        run: uv run pytest -q

  frontend-build:
    name: frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install (no postinstall scripts)
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::warning ::frontend has no package-lock.json yet — skipping (run 'npm install --ignore-scripts --package-lock-only' once locally)"
            exit 0
          fi
          npm ci --ignore-scripts
          npm audit signatures

      - name: typecheck
        run: |
          if [ ! -d node_modules ]; then exit 0; fi
          npm run typecheck

      - name: lint
        run: |
          if [ ! -d node_modules ]; then exit 0; fi
          npm run lint

      - name: build
        run: |
          if [ ! -d node_modules ]; then exit 0; fi
          npm run build
