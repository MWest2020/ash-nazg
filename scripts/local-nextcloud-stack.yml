# scripts/local-nextcloud-stack.yml
#
# LEVEL 3 verifier — local Nextcloud stack for smoke-testing Ash Nazg.
#
# wire-dosbox-engine §1 rewrite: docker-install via HaRP. AppAPI's
# canonical deploy path. The host shim is NOT started by compose —
# AppAPI/HaRP spawns it on app:register, with APP_PORT, APP_SECRET,
# APP_VERSION, APP_ID, NEXTCLOUD_URL injected as env vars.
#
#   Usage:
#     docker compose -f scripts/local-nextcloud-stack.yml up -d
#     ./scripts/bootstrap-nextcloud.sh
#     # browse to http://localhost:8088 (admin / admin-local-dev)
#
#   Teardown:
#     docker compose -f scripts/local-nextcloud-stack.yml down -v
#
# Prerequisites:
# - A running Docker / Podman socket reachable as
#   /var/run/docker.sock (rootful) OR /run/user/$UID/podman/podman.sock
#   (rootless). HaRP needs it to spawn the ExApp container.
# - An ash-nazg-host image accessible to HaRP. For local development
#   either build locally and reference by tag, or push to a registry
#   HaRP can reach (GHCR for the standard distribution).
#
# Caveats:
# - Credentials in this file are LOCAL DEV ONLY. Never reuse.
# - Ports: NC on 8088, HaRP HTTP on 8780, HaRP FRP on 8782.
# - HP_FRP_SHARED_KEY is a per-stack secret used by AppAPI ↔ HaRP;
#   the bootstrap reads it from the env or generates a fresh one
#   per `up`.

services:

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud-local-dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [ash-nazg-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Local Docker registry — stands in for GHCR in level-3 testing
  # so the full pull-via-AppAPI flow can be exercised without
  # publishing to a public registry. The bootstrap pushes the host
  # image here as `registry:5000/ash-nazg-host:<tag>` and info.xml
  # is overridden via runtime push to match.
  registry:
    image: docker.io/library/registry:2
    networks: [ash-nazg-net]
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 3s
      retries: 12

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    volumes:
      - valkey-data:/data
    networks: [ash-nazg-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  nextcloud:
    image: docker.io/library/nextcloud:32-apache
    ports:
      - "8088:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud-local-dev
      REDIS_HOST: valkey
      REDIS_HOST_PORT: 6379
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin-local-dev
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1
      OVERWRITEHOST: localhost:8088
      OVERWRITEPROTOCOL: http
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - nextcloud-data:/var/www/html
      # AppAPI 5.x + HaRP/docker-install requires that requests to
      # <nextcloud_url>/exapps/* be reverse-proxied to HaRP:8780.
      # NC's image doesn't ship this rule by default; we drop it
      # into conf-enabled so it loads at Apache startup.
      - ./nextcloud-conf/exapps-proxy.conf:/etc/apache2/conf-enabled/exapps-proxy.conf:ro
    networks: [ash-nazg-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # AppAPI's canonical docker-install deploy daemon. Spawns ExApp
  # containers via the Docker socket and proxies HTTP traffic
  # between Nextcloud and the ExApp via HAProxy + FRP.
  appapi-harp:
    image: ghcr.io/nextcloud/nextcloud-appapi-harp:v0.4.0
    environment:
      NC_INSTANCE_URL: http://nextcloud
      # Per-stack shared secret. HaRP reads this from HP_SHARED_KEY;
      # AppAPI registers the daemon with the matching --harp_shared_key
      # value. (HP_SHARED_KEY_FILE is the alternative for secret-
      # store integrations; we use the env-var path for local dev.)
      HP_SHARED_KEY: ${HP_SHARED_KEY:-ash-nazg-local-dev-key}
      # Quieter than the default "warning" → "info" while
      # debugging; bump to "warning" once the stack is reliable.
      HP_LOG_LEVEL: info
    ports:
      # 8780 = HTTP daemon endpoint AppAPI talks to.
      # 8782 = FRP server ExApp containers register with for
      # bidirectional comms.
      - "8780:8780"
      - "8782:8782"
    volumes:
      # HaRP needs the container runtime's socket to spawn ExApps.
      # Rootless podman: /run/user/$UID/podman/podman.sock
      # Rootful docker:  /var/run/docker.sock:z
      # Set DOCKER_SOCKET in the environment to point at the right
      # one for this host; defaults to the rootless podman path.
      - ${DOCKER_SOCKET:-/run/user/1000/podman/podman.sock}:/var/run/docker.sock:z
    # NOTE: Rootless-podman socket perms (0660 owned by host uid
    # 1000) are unreadable by container-root inside the user
    # namespace. For local-dev, run once before `up`:
    #   chmod 0666 /run/user/$(id -u)/podman/podman.sock
    # On Docker rootful this is unnecessary; the socket is 0666 by
    # default. `userns_mode: keep-id` does NOT work — podman-compose
    # uses pods, and --userns is incompatible with --pod.
    networks: [ash-nazg-net]
    # SELinux blocks frpc inside HaRP from connect()-ing to the
    # mounted docker socket on Enforcing systems even with a `:z`
    # relabel. Disable the container label only for HaRP — the
    # other services don't need it. On non-SELinux hosts this is a
    # no-op.
    security_opt: ["label=disable"]
    depends_on:
      nextcloud:
        condition: service_healthy
    restart: unless-stopped

networks:
  ash-nazg-net:
    driver: bridge

volumes:
  postgres-data: {}
  valkey-data: {}
  nextcloud-data: {}
