# Reverse-proxy /exapps/* to the HaRP daemon.
# Required for AppAPI 5.x + HaRP/docker-install — AppAPI generates
# ExApp URLs as <nextcloud_url>/exapps/<appid>, expecting that path
# to be proxied to HaRP's HTTP frontend on :8780. Without this rule
# the ExApp heartbeat fails and the AppAPI proxy URL 404s.
#
# A bare ProxyPass at server scope is overridden by NC's per-vhost
# .htaccess RewriteRule (which sends every request to index.php).
# Scoping the proxy inside a <Location> + disabling RewriteEngine
# within it keeps /exapps/* on the proxy path.

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

ProxyPreserveHost On
ProxyRequests Off

<Location "/exapps/">
    ProxyPass        "http://appapi-harp:8780/exapps/"
    ProxyPassReverse "http://appapi-harp:8780/exapps/"
    RewriteEngine Off
</Location>
